kind = "web"
previewPath = "/"
title = "Career Hub"
version = "1.0.0"
id = "artifacts/career-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20829

[services.development]
run = "pnpm --filter @workspace/career-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/career-hub", "run", "build" ]
publicDir = "public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20829"
BASE_PATH = "/"
